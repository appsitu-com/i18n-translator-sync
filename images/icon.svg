<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="8 8 112 112">
  <defs>
    <linearGradient id="modernGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#009e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,1)" />
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#modernGradient)" />

  <!-- Floating layers for depth -->
  <rect x="16" y="16" width="96" height="96" rx="16" fill="rgba(255,255,255,0.1)" />
  <rect x="24" y="24" width="80" height="80" rx="12" fill="rgba(255,255,255,0.1)" />

  <!-- Language symbols -->
  <text x="18" y="36" font-family="Arial, sans-serif" font-size="24" fill="yellow" opacity="0.6" filter="url(#dropShadow)">A</text>
  <text x="90" y="36" font-family="Arial, sans-serif" font-size="22" fill="yellow" opacity="0.6" filter="url(#dropShadow)">文</text>
  <text x="18" y="110" font-family="Arial, sans-serif" font-size="28" fill="yellow" opacity="0.6" filter="url(#dropShadow)">א</text>
  <text x="84" y="110" font-family="Arial, sans-serif" font-size="30" fill="yellow" opacity="0.6" filter="url(#dropShadow)">あ</text>

  <!-- Central icon -->
  <circle cx="64" cy="64" r="35" fill="rgba(0,0,0,0.2)" filter="url(#dropShadow)" />
  <text x="64" y="68" font-family="Arial, sans-serif" font-size="27" font-weight="bold" fill="white" text-anchor="middle">i18n</text>
  <text x="64" y="88" font-family="Arial, sans-serif" font-size="15" font-weight="normal" fill="white" text-anchor="middle" opacity="0.9">SYNC</text>
</svg>
