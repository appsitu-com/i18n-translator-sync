name: Release
on:
  push:
    tags: [ 'v*.*.*' ]
jobs:
  package-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test:cov
        env:
          AZURE_TRANSLATION_URL: ${{ secrets.AZURE_TRANSLATION_URL }}
          AZURE_TRANSLATION_KEY: ${{ secrets.AZURE_TRANSLATION_KEY }}
          AZURE_TRANSLATION_REGION: ${{ secrets.AZURE_TRANSLATION_REGION }}
          DEEPL_TRANSLATION_KEY: ${{ secrets.DEEPL_TRANSLATION_KEY }}
          DEEPL_TRANSLATION_URL: ${{ secrets.DEEPL_TRANSLATION_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATION_URL: ${{ secrets.GOOGLE_TRANSLATION_URL }}
          GOOGLE_TRANSLATION_KEY: ${{ secrets.GOOGLE_TRANSLATION_KEY }}
          GOOGLE_TRANSLATION_PROJECT_ID: ${{ secrets.GOOGLE_TRANSLATION_PROJECT_ID }}
          GOOGLE_TRANSLATION_LOCATION: ${{ secrets.GOOGLE_TRANSLATION_LOCATION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          raw_version="${GITHUB_REF#refs/tags/v}"
          core_version="${raw_version%%-*}"
          echo "VERSION=${core_version}" >> "$GITHUB_OUTPUT"
      - name: Package extension
        run: pnpm package --version=${{ steps.version.outputs.VERSION }} --ci
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: releases/i18n-translator-vscode-${{ steps.version.outputs.VERSION }}.vsix

  create-release:
    needs: package-vsix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v5
        with:
          name: vsix
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*.vsix
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
