name: Publish
on:
  release:
    types: [published]
jobs:
  publish-marketplaces:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: windows-latest
            target: win32-x64
          - os: macos-latest
            target: darwin-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Prepare native dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - name: Extract version from release tag
        id: version
        shell: bash
        run: |
          raw_tag='${{ github.event.release.tag_name }}'
          raw_version="${raw_tag#v}"
          core_version="${raw_version%%-*}"
          echo "VERSION=${core_version}" >> "$GITHUB_OUTPUT"
      - name: Package extension
        run: pnpm package --version=${{ steps.version.outputs.VERSION }} --ci --target=${{ matrix.target }}
      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish --packagePath releases/i18n-translator-vscode-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.vsix --pat ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: false
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: pnpm exec ovsx publish releases/i18n-translator-vscode-${{ steps.version.outputs.VERSION }}-${{ matrix.target }}.vsix -p $OVSX_TOKEN
