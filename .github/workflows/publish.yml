name: Publish
on:
  release:
    types: [published]
jobs:
  publish-marketplaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with: { node-version: '24', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Extract version from release tag
        id: version
        shell: bash
        run: |
          raw_tag='${{ github.event.release.tag_name }}'
          raw_version="${raw_tag#v}"
          core_version="${raw_version%%-*}"
          echo "VERSION=${core_version}" >> "$GITHUB_OUTPUT"
      - name: Package extension
        run: pnpm package --version=${{ steps.version.outputs.VERSION }} --ci
      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish --packagePath releases/i18n-translator-vscode-${{ steps.version.outputs.VERSION }}.vsix --pat ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: false
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: pnpm exec ovsx publish releases/i18n-translator-vscode-${{ steps.version.outputs.VERSION }}.vsix -p $OVSX_TOKEN
