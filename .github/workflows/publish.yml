name: Publish
on:
  workflow_run:
    workflows: ['Release']
    types: [completed]
    branches: [main]
jobs:
  publish-marketplaces:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Prepare native dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - name: Extract version from latest tag
        id: version
        run: echo "VERSION=$(git describe --tags --abbrev=0 | cut -d'v' -f2)" >> $GITHUB_OUTPUT
      - name: Package extension
        run: pnpm package --version=${{ steps.version.outputs.VERSION }} --ci
      - name: Install publishing tools
        run: pnpm add -g @vscode/vsce ovsx
      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath releases/*.vsix --pat ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: false
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: ovsx publish releases/*.vsix -p $OVSX_TOKEN
