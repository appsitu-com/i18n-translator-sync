name: Publish
on:
  release:
    types: [published]
jobs:
  publish-marketplaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npm run build
      - run: npm i -g @vscode/vsce ovsx && vsce package
      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: vsce publish --packagePath *.vsix --pat $VSCE_PAT
        env: { VSCE_PAT: ${{ secrets.VSCE_PAT }} }
      - name: Publish to Open VSX
        if: ${{ secrets.OVSX_TOKEN != '' }}
        run: ovsx publish *.vsix -p $OVSX_TOKEN
        env: { OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }} }
