name: Publish
on:
  release:
    types: [published]
jobs:
  publish-marketplaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Extract version from release tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Package extension
        run: pnpm package --version=${{ steps.version.outputs.VERSION }} --ci
      - name: Install publishing tools
        run: pnpm add -g @vscode/vsce ovsx
      - name: Publish to VS Code Marketplace
        run: vsce publish --packagePath releases/*.vsix --pat ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: false
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
        run: ovsx publish releases/*.vsix -p $OVSX_TOKEN
