name: CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Prepare native deps
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: pnpm build
      - run: pnpm test:cov
        env:
          "AZURE_TRANSLATION_URL: ${{ secrets."AZURE_TRANSLATION_URL }}
          AZURE_TRANSLATION_KEY: ${{ secrets.AZURE_TRANSLATION_KEY }}
          AZURE_TRANSLATION_REGION: ${{ secrets.AZURE_TRANSLATION_REGION }}
          DEEPL_TRANSLATION_KEY: ${{ secrets.DEEPL_TRANSLATION_KEY }}
          DEEPL_TRANSLATION_URL: ${{ secrets.DEEPL_TRANSLATION_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_TRANSLATION_URL: ${{ secrets.GOOGLE_TRANSLATION_URL }}
          GOOGLE_TRANSLATION_KEY: ${{ secrets.GOOGLE_TRANSLATION_KEY }}
          GOOGLE_TRANSLATION_PROJECT_ID: ${{ secrets.GOOGLE_TRANSLATION_PROJECT_ID }}
          GOOGLE_TRANSLATION_LOCATION: ${{ secrets.GOOGLE_TRANSLATION_LOCATION }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage
